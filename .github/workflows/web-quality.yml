name: Web quality

# Lint + typecheck + production build for the portal web app. Reusable (called by
# pr-gate on PRs and by deploy-staging as a final gate on the release commit) and
# also runs standalone on PRs that touch the app or shared config.

on:
  workflow_call:
  pull_request:
    branches: [main, staging]
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - 'tsconfig.base.json'
      - '.github/workflows/web-quality.yml'

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 9.12.0

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
