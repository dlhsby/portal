name: Deploy staging (AWS)

# Builds the portal web image, pushes it to ECR, and deploys to the shared EC2
# host via SSM Run Command (no SSH). Auth uses GitHub OIDC — no long-lived AWS
# keys stored in GitHub. The portal is a static landing page: one image, no
# database, no migrations, no secrets.
#
# Required repo Variables (Settings → Secrets and variables → Actions → Variables):
#   AWS_REGION               ap-southeast-3
#   AWS_ROLE_ARN             arn:aws:iam::659828096624:role/portal-gha-deploy
#   ECR_WEB                  659828096624.dkr.ecr.ap-southeast-3.amazonaws.com/portal-web
#   EC2_INSTANCE_ID          i-08edccdc966c0985e   (the shared dlhsby box)
# Optional repo Variables (sensible defaults below if unset):
#   SEKAR_URL                https://sekar.wahyutrip.com
#   SWAT_URL                 https://swat.wahyutrip.com
#   CADDY_CONFD_DIR          /home/ec2-user/sekar/infra/conf.d   (shared edge Caddy drop-in dir)
#   SHARED_CADDY_CONTAINER   sekar-caddy                         (the shared edge Caddy container)
#
# There are NO GitHub Environment secrets — the portal has none.

on:
  # Deploy is DELIBERATE, not every-push: release by merging main -> staging
  # (push to the `staging` branch), or trigger manually from the Actions tab.
  push:
    branches: [staging]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  # Final quality gate on the release commit before building/deploying.
  quality:
    uses: ./.github/workflows/web-quality.yml

  build-push:
    needs: [quality]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      sha: ${{ steps.vars.outputs.sha }}
    steps:
      - uses: actions/checkout@v7

      - id: vars
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build & push web
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./infra/Dockerfile.web
          platforms: linux/amd64
          push: true
          # Public app URLs are inlined into the bundle at build time (no secrets).
          build-args: |
            NEXT_PUBLIC_SEKAR_URL=${{ vars.SEKAR_URL || 'https://sekar.wahyutrip.com' }}
            NEXT_PUBLIC_SWAT_URL=${{ vars.SWAT_URL || 'https://swat.wahyutrip.com' }}
          tags: |
            ${{ vars.ECR_WEB }}:staging
            ${{ vars.ECR_WEB }}:${{ steps.vars.outputs.sha }}
          cache-from: type=gha,scope=portal-web
          cache-to: type=gha,mode=max,scope=portal-web

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      SHA: ${{ needs.build-push.outputs.sha }}
    steps:
      - uses: actions/checkout@v7

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy via SSM (pull, up --wait, reload shared Caddy)
        env:
          CADDY_CONFD_DIR: ${{ vars.CADDY_CONFD_DIR || '/home/ec2-user/sekar/infra/conf.d' }}
          SHARED_CADDY_CONTAINER: ${{ vars.SHARED_CADDY_CONTAINER || 'sekar-caddy' }}
        run: |
          set -euo pipefail
          COMPOSE_B64=$(base64 -w0 infra/compose.staging.yml)
          CADDY_B64=$(base64 -w0 infra/portal.caddy)

          # Script that runs on the box as ec2-user (the ECR cred helper lives there).
          BOX=$(cat <<EOF
          set -e
          mkdir -p ~/portal/infra
          echo $COMPOSE_B64 | base64 -d > ~/portal/infra/compose.staging.yml

          # Ship the Caddy drop-in into the SHARED edge Caddy's conf.d. This is the
          # ONLY file we write there — the shared Caddyfile and other co-tenants
          # (sekar, swat) are never touched, so their sites are unaffected.
          mkdir -p "$CADDY_CONFD_DIR"
          echo $CADDY_B64 | base64 -d > "$CADDY_CONFD_DIR/portal.caddy"

          docker network create edge 2>/dev/null || true
          cd ~/portal/infra
          export IMAGE_TAG=$SHA
          # Reclaim disk BEFORE pulling the new SHA-pinned image so the shared box
          # doesn't accumulate one image set per deploy (it has hit "no space left"
          # before). Running containers keep their images referenced, so this only
          # drops unused image layers + build cache — never volumes, certs, or the
          # live sekar/swat/portal images. Mirrors the sekar deploy's cleanup.
          docker image prune -af || true
          docker builder prune -af || true
          df -h / | tail -1
          docker compose -f compose.staging.yml pull --quiet
          docker compose -f compose.staging.yml up -d --force-recreate --wait
          # Drop the now-dangling previous portal-web image left by this recreate.
          docker image prune -f

          # Reload the shared edge Caddy so it picks up the new drop-in + upstream.
          # Prefer a graceful reload (no downtime for sekar/swat); fall back to a
          # container restart only if reload fails.
          docker exec "$SHARED_CADDY_CONTAINER" caddy reload --config /etc/caddy/Caddyfile --adapter caddyfile \
            || docker restart "$SHARED_CADDY_CONTAINER"

          # Fail loudly if the running image is not the SHA we just built.
          RUNNING=\$(docker inspect portal-web --format '{{.Config.Image}}')
          EXPECT="${{ vars.ECR_WEB }}:\$IMAGE_TAG"
          echo "running portal-web image: \$RUNNING (expected \$EXPECT)"
          test "\$RUNNING" = "\$EXPECT"
          echo "DEPLOY-VERIFIED \$IMAGE_TAG"
          EOF
          )
          RUN_B64=$(printf '%s' "$BOX" | base64 -w0)
          printf '{"commands":["runuser -l ec2-user -c \\"echo %s | base64 -d > /tmp/portal-deploy.sh && bash /tmp/portal-deploy.sh\\""]}' "$RUN_B64" > params.json

          CMD_ID=$(aws ssm send-command \
            --instance-ids "${{ vars.EC2_INSTANCE_ID }}" \
            --document-name AWS-RunShellScript \
            --comment "deploy-portal-staging ${SHA}" \
            --parameters file://params.json \
            --query Command.CommandId --output text)
          echo "SSM command: $CMD_ID"
          STATUS=InProgress
          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "${{ vars.EC2_INSTANCE_ID }}" --query Status --output text 2>/dev/null || echo Pending)
            case "$STATUS" in Success|Failed|Cancelled|TimedOut) break;; esac
            sleep 5
          done
          echo "::group::stdout"
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "${{ vars.EC2_INSTANCE_ID }}" --query StandardOutputContent --output text | tail -60
          echo "::endgroup::"
          echo "::group::stderr"
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "${{ vars.EC2_INSTANCE_ID }}" --query StandardErrorContent --output text | tail -60
          echo "::endgroup::"
          echo "Deploy status: $STATUS"
          test "$STATUS" = "Success"

      - name: Smoke test
        run: |
          set -euo pipefail
          # Retry covers the brief window while Caddy provisions the Let's Encrypt cert.
          for i in $(seq 1 10); do
            if curl -fsSI --retry 3 https://dlh.wahyutrip.com >/dev/null; then
              echo "portal healthy"; break
            fi
            echo "waiting for portal... ($i)"; sleep 6
          done
          curl -fsSI https://dlh.wahyutrip.com | head -1
